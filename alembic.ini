# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# prepend sys.path
prepend_sys_path = .

# version path separator; defaults to os
version_path_separator = os

# file template to use for new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# the sqlalchemy.url is set programmatically in env.py from environment variables
# sqlalchemy.url = ...

[post_write_hooks]
# none configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
